# CytoPert pre-commit hooks (stage 9).
#
# Install once with:
#     pip install -e .[dev]
#     pre-commit install
#
# Then `git commit` runs all hooks; `pre-commit run --all-files` runs
# them on the whole tree.

repos:
  - repo: local
    hooks:
      - id: check-no-chinese
        name: Reject CJK characters in cytopert/ and tests/
        entry: python scripts/check_no_chinese.py
        language: system
        pass_filenames: false
        always_run: true

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]

  - repo: https://github.com/econchick/interrogate
    rev: 1.7.0
    hooks:
      - id: interrogate
        args: ["-c", "pyproject.toml", "cytopert"]
        pass_filenames: false
